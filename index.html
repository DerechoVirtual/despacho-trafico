    <!-- Datos estructurados: Preguntas frecuentes (FAQPage) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "¿Cuánto tiempo tengo para recurrir una multa?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "En vía administrativa el plazo suele ser de 20 días naturales desde que te notifican, tanto para alegaciones como para el recurso. Por eso conviene actuar cuanto antes."
            }
          },
          {
            "@type": "Question",
            "name": "¿Merece la pena recurrir o es mejor pagar con el descuento?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Depende de tu caso. Lo estudiamos gratis y solo te recomendamos recurrir si vemos posibilidades reales. Si no las hay, te lo decimos con honestidad."
            }
          },
          {
            "@type": "Question",
            "name": "¿Puedo recurrir aunque ya haya pasado el plazo de pronto pago?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Sí. Aunque pierdas el descuento, existen fases posteriores —recurso de reposición, vía contencioso-administrativa u oposición a la providencia de apremio— en las que aún se puede actuar."
            }
          },
          {
            "@type": "Question",
            "name": "¿Recuperaré los puntos del carnet si gano?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Si la sanción se anula, no se descuentan los puntos asociados a ella. Defender la multa es precisamente la vía para proteger tu saldo de puntos."
            }
          },
          {
            "@type": "Question",
            "name": "Me han denunciado por alcoholemia o por el móvil, ¿qué hago?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Son infracciones muy graves e incluso delito. Analizamos si el procedimiento, el aparato de medición o la notificación tienen defectos que abran una vía de defensa. No firmes ni asumas nada sin asesorarte."
            }
          },
          {
            "@type": "Question",
            "name": "¿Tengo que desplazarme hasta el despacho?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Trabajamos en toda España de forma online: nos envías la documentación y nosotros nos encargamos de todo el trámite."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué necesitáis para empezar?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Solo el boletín de denuncia o la notificación de la sanción y tus datos de contacto. Con eso hacemos el estudio de viabilidad."
            }
          },
          {
            "@type": "Question",
            "name": "¿La primera consulta tiene algún coste?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. El estudio de viabilidad de tu multa es gratuito y sin compromiso. Primero miramos si tiene recurso y luego decides."
            }
          }
        ]
      }
